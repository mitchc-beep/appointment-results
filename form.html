<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Result</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0d0f12;--surface:#161a20;--surface2:#1e232b;--border:#2a3040;--border2:#384050;
  --text:#e8eaf0;--muted:#7a8299;--accent:#4f8ef7;--accent-glow:rgba(79,142,247,0.15);
  --no-show:#e85d5d;--no-show-bg:rgba(232,93,93,0.1);
  --no-demo:#f0a432;--no-demo-bg:rgba(240,164,50,0.1);
  --pm:#7f6af0;--pm-bg:rgba(127,106,240,0.1);
  --sold:#34c97a;--sold-bg:rgba(52,201,122,0.1);
  --radius:12px;--radius-sm:8px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 20px;display:flex;align-items:center;gap:12px;}
.header-icon{width:34px;height:34px;background:var(--accent-glow);border:1px solid var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.header h1{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
.header p{font-size:12px;color:var(--muted);margin-top:1px;}
.container{max-width:540px;margin:0 auto;padding:24px 16px 60px;}
.section-label{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.loc-wrap{margin-bottom:24px;}
#loc-loading{font-size:13px;color:var(--muted);padding:12px 0;}
select#location-select{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;padding:13px 14px;outline:none;-webkit-appearance:none;transition:border-color .15s;}
select#location-select:focus{border-color:var(--accent);}
select option{background:#1e232b;}
#form-body{display:none;}
.outcome-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.outcome-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 14px;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:12px;}
.outcome-btn:active{transform:scale(0.97);}
.outcome-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.outcome-btn .name{font-size:15px;font-weight:500;color:var(--text);}
.outcome-btn .sub{font-size:11px;color:var(--muted);margin-top:2px;}
.outcome-btn[data-val="No Show"] .outcome-dot{background:var(--no-show);}
.outcome-btn[data-val="No Demo"] .outcome-dot{background:var(--no-demo);}
.outcome-btn[data-val="P&M"]     .outcome-dot{background:var(--pm);}
.outcome-btn[data-val="Sold"]    .outcome-dot{background:var(--sold);}
.outcome-btn[data-val="No Show"].selected{border-color:var(--no-show);background:var(--no-show-bg);}
.outcome-btn[data-val="No Demo"].selected{border-color:var(--no-demo);background:var(--no-demo-bg);}
.outcome-btn[data-val="P&M"].selected{border-color:var(--pm);background:var(--pm-bg);}
.outcome-btn[data-val="Sold"].selected{border-color:var(--sold);background:var(--sold-bg);}
.fields{display:none;}
.fields.visible{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.field-group{margin-bottom:18px;}
.field-group label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:7px;letter-spacing:.03em;}
.field-group label .req{color:var(--accent);margin-left:2px;}
input[type=text],input[type=time],input[type=number],select.inner,textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;padding:13px 14px;outline:none;transition:border-color .15s;-webkit-appearance:none;}
input:focus,select.inner:focus,textarea:focus{border-color:var(--accent);}
select.inner option{background:#1e232b;}
textarea{resize:vertical;min-height:90px;}
input[type=number]{font-family:var(--mono);}
.input-prefix{position:relative;}
.input-prefix span{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}
.input-prefix input{padding-left:26px;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.photo-upload{background:var(--surface);border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative;}
.photo-upload:hover{border-color:var(--accent);background:var(--accent-glow);}
.photo-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0;}
.photo-upload .icon{font-size:24px;margin-bottom:6px;}
.photo-upload .lbl{font-size:13px;color:var(--muted);}
.photo-upload .lbl strong{color:var(--text);font-weight:500;}
#photo-preview{margin-top:12px;display:none;border-radius:var(--radius-sm);overflow:hidden;}
#photo-preview img{width:100%;max-height:180px;object-fit:cover;display:block;}
.divider{border:none;border-top:1px solid var(--border);margin:24px 0;}
.sold-badge{display:inline-flex;align-items:center;gap:6px;background:var(--sold-bg);border:1px solid var(--sold);color:var(--sold);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:16px;}
.sold-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sold);}
.submit-btn{width:100%;padding:16px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-btn:active{transform:scale(0.98);opacity:.85;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:13px 20px;border-radius:var(--radius);font-size:14px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--sold);color:var(--sold);}
.toast.error{border-color:var(--no-show);color:var(--no-show);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.loading .spinner{display:block;}
.loading .btn-text{display:none;}
</style>
</head>
<body>
 
<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <h1>Appointment Result</h1>
    <p>Log your outcome after each appointment</p>
  </div>
</div>
 
<div class="container">
  <div class="loc-wrap">
    <div class="section-label">Your location</div>
    <div id="loc-loading">Loading locations...</div>
    <select id="location-select" style="display:none;"></select>
  </div>
 
  <div id="form-body">
    <div class="section-label">Select outcome</div>
    <div class="outcome-grid">
      <button class="outcome-btn" data-val="No Show">
        <div class="outcome-dot"></div>
        <div><div class="name">No Show</div><div class="sub">Customer absent</div></div>
      </button>
      <button class="outcome-btn" data-val="No Demo">
        <div class="outcome-dot"></div>
        <div><div class="name">No Demo</div><div class="sub">Didn't present</div></div>
      </button>
      <button class="outcome-btn" data-val="P&M">
        <div class="outcome-dot"></div>
        <div><div class="name">P&amp;M</div><div class="sub">Price &amp; measure</div></div>
      </button>
      <button class="outcome-btn" data-val="Sold">
        <div class="outcome-dot"></div>
        <div><div class="name">Sold</div><div class="sub">Deal closed &#10003;</div></div>
      </button>
    </div>
 
    <div class="fields" id="form-fields">
      <div class="row-2">
        <div class="field-group">
          <label>Customer name <span class="req">*</span></label>
          <input type="text" id="f-customer" placeholder="Full name">
        </div>
        <div class="field-group">
          <label>Rep name <span class="req">*</span></label>
          <input type="text" id="f-rep" placeholder="Your name">
        </div>
      </div>
      <div class="field-group">
        <label>Time of appointment <span class="req">*</span></label>
        <input type="time" id="f-time">
      </div>
      <div class="field-group">
        <label>Objection</label>
        <input type="text" id="f-objection" placeholder="Main objection raised">
      </div>
      <div class="field-group">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Additional comments..."></textarea>
      </div>
      <div class="field-group" id="grp-price" style="display:none;">
        <label>Price quoted</label>
        <div class="input-prefix"><span>$</span><input type="number" id="f-price" placeholder="0.00" step="0.01" min="0"></div>
      </div>
      <div id="grp-sold" style="display:none;">
        <div class="sold-badge">Sold fields</div>
        <div class="row-2">
          <div class="field-group">
            <label>Form of payment</label>
            <select id="f-payment" class="inner">
              <option value="">Select...</option>
              <option>Cash</option><option>Check</option><option>Credit card</option>
              <option>Financing</option><option>Zelle / Venmo</option><option>Other</option>
            </select>
          </div>
          <div class="field-group">
            <label>Deposit amount</label>
            <div class="input-prefix"><span>$</span><input type="number" id="f-deposit" placeholder="0.00" step="0.01" min="0"></div>
          </div>
        </div>
      </div>
      <div class="field-group">
        <label>Photo attachment</label>
        <div class="photo-upload">
          <input type="file" id="f-photo" accept="image/*" capture="environment">
          <div class="icon">📷</div>
          <div class="lbl"><strong>Tap to take or upload a photo</strong></div>
          <div class="lbl" style="margin-top:4px;font-size:11px;">JPG, PNG accepted</div>
        </div>
        <div id="photo-preview"><img id="photo-img" src="" alt="Preview"></div>
      </div>
      <hr class="divider">
      <button class="submit-btn" id="submit-btn">
        <div class="spinner" id="spinner"></div>
        <span class="btn-text">Submit result</span>
      </button>
    </div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
var firebaseConfig = {
  apiKey:            "AIzaSyBbVgHgZFjxVAdNnicDKUNZ0IB45nIcjrE",
  authDomain:        "appointment-results.firebaseapp.com",
  projectId:         "appointment-results",
  storageBucket:     "appointment-results.firebasestorage.app",
  messagingSenderId: "772701567206",
  appId:             "1:772701567206:web:5274983c371821ca2d6327"
};
 
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
 
var locations       = [];
var selectedLocation = null;
var selectedOutcome  = null;
 
// ── LOAD LOCATIONS ────────────────────────────────────────────────────────
db.collection("locations").get().then(function(snap) {
  locations = snap.docs.map(function(d) { return Object.assign({ id: d.id }, d.data()); });
  locations.sort(function(a,b) { return a.name.localeCompare(b.name); });
 
  var sel = document.getElementById("location-select");
  sel.innerHTML = '<option value="">Select your location...</option>';
  locations.forEach(function(loc) {
    var opt = document.createElement("option");
    opt.value = loc.id;
    opt.textContent = loc.name;
    sel.appendChild(opt);
  });
  document.getElementById("loc-loading").style.display = "none";
  sel.style.display = "block";
}).catch(function(e) {
  document.getElementById("loc-loading").textContent = "Could not load locations. Check Firebase config.";
});
 
document.getElementById("location-select").addEventListener("change", function() {
  selectedLocation = locations.find(function(l) { return l.id === this.value; }, this) || null;
  document.getElementById("form-body").style.display = selectedLocation ? "block" : "none";
  selectedOutcome = null;
  document.querySelectorAll(".outcome-btn").forEach(function(b) { b.classList.remove("selected"); });
  document.getElementById("form-fields").classList.remove("visible");
});
 
// ── OUTCOME BUTTONS ───────────────────────────────────────────────────────
document.querySelectorAll(".outcome-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".outcome-btn").forEach(function(b) { b.classList.remove("selected"); });
    btn.classList.add("selected");
    selectedOutcome = btn.dataset.val;
    var isSold = selectedOutcome === "Sold";
    var isPM   = selectedOutcome === "P&M";
    document.getElementById("grp-price").style.display = (isSold || isPM) ? "block" : "none";
    document.getElementById("grp-sold").style.display  = isSold ? "block" : "none";
    document.getElementById("form-fields").classList.add("visible");
  });
});
 
// ── PHOTO PREVIEW ─────────────────────────────────────────────────────────
document.getElementById("f-photo").addEventListener("change", function() {
  var file = this.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById("photo-img").src = e.target.result;
    document.getElementById("photo-preview").style.display = "block";
  };
  reader.readAsDataURL(file);
});
 
// ── SUBMIT ────────────────────────────────────────────────────────────────
document.getElementById("submit-btn").addEventListener("click", function() {
  if (!selectedLocation) { showToast("Please select a location", "error"); return; }
  if (!selectedOutcome)  { showToast("Please select an outcome", "error"); return; }
 
  var customer = document.getElementById("f-customer").value.trim();
  var rep      = document.getElementById("f-rep").value.trim();
  if (!customer || !rep) { showToast("Customer and rep name are required", "error"); return; }
 
  var btn = document.getElementById("submit-btn");
  btn.disabled = true; btn.classList.add("loading");
 
  var apptTime  = document.getElementById("f-time").value;
  var objection = document.getElementById("f-objection").value.trim();
  var notes     = document.getElementById("f-notes").value.trim();
  var price     = document.getElementById("f-price").value;
  var payment   = document.getElementById("f-payment").value;
  var deposit   = document.getElementById("f-deposit").value;
  var now       = new Date().toLocaleString("en-US", {dateStyle:"medium", timeStyle:"short"});
  var emoji     = {"No Show":"🔴","No Demo":"🟠","P&M":"🟣","Sold":"🟢"}[selectedOutcome] || "⚪";
 
  var lines = [
    emoji + " *Appointment Result: " + selectedOutcome + "*",
    "📍 Location: " + selectedLocation.name,
    "📅 Submitted: " + now,
    "",
    "*Customer:* " + (customer || "—"),
    "*Rep:* " + (rep || "—"),
    "*Appt Time:* " + (apptTime || "—")
  ];
  if (objection) lines.push("*Objection:* " + objection);
  if (notes)     lines.push("*Notes:* " + notes);
  if (price)     lines.push("*Price Quoted:* $" + parseFloat(price).toFixed(2));
  if (selectedOutcome === "Sold") {
    if (payment) lines.push("*Form of Payment:* " + payment);
    if (deposit) lines.push("*Deposit:* $" + parseFloat(deposit).toFixed(2));
  }
  var messageText = lines.join("\n");
  var messageHtml = lines.map(function(l) {
    return l === "" ? "<br>" : l.replace(/\*(.*?)\*/g, "<strong>$1</strong>");
  }).join("<br>");
 
  var payload = {
    locationId:   selectedLocation.id,
    locationName: selectedLocation.name,
    outcome:      selectedOutcome,
    customer:     customer,
    rep:          rep,
    apptTime:     apptTime,
    objection:    objection,
    notes:        notes,
    price:        price,
    payment:      payment,
    deposit:      deposit,
    submittedAt:  now,
    createdAt:    firebase.firestore.FieldValue.serverTimestamp()
  };
 
  // Save to Firestore first
  db.collection("submissions").add(payload).catch(function(e) {
    console.warn("Firestore write failed:", e.message);
  });
 
  var results = [];
  var promises = [];
 
  // Google Space — all outcomes
  if (selectedLocation.webhook_main) {
    promises.push(sendToSpace(selectedLocation.webhook_main, messageText)
      .then(function(r) { results.push({ label: "Main Space", ok: r }); }));
  }
  // Google Space — sold only
  if (selectedOutcome === "Sold" && selectedLocation.webhook_sold) {
    promises.push(sendToSpace(selectedLocation.webhook_sold, messageText)
      .then(function(r) { results.push({ label: "Sold Space", ok: r }); }));
  }
  // Email — all outcomes
  if (selectedLocation.email_main && selectedLocation.emailjs_service) {
    promises.push(sendEmail(selectedLocation, selectedLocation.email_main, payload, messageHtml)
      .then(function(r) { results.push({ label: "Email", ok: r }); }));
  }
  // Email — sold only
  if (selectedOutcome === "Sold" && selectedLocation.email_sold && selectedLocation.emailjs_service) {
    promises.push(sendEmail(selectedLocation, selectedLocation.email_sold, payload, messageHtml)
      .then(function(r) { results.push({ label: "Sold Email", ok: r }); }));
  }
 
  Promise.all(promises).then(function() {
    btn.disabled = false; btn.classList.remove("loading");
    var failed = results.filter(function(r) { return !r.ok; });
    var ok     = results.filter(function(r) { return r.ok; });
    if (failed.length === 0) {
      showToast("Result submitted" + (ok.length ? " — sent to " + ok.map(function(r){return r.label;}).join(", ") : " — saved"), "success");
    } else if (ok.length > 0) {
      showToast("Partial: " + ok.map(function(r){return r.label;}).join(", ") + " sent", "error");
    } else {
      showToast("Saved to history — check webhook/email config", "error");
    }
    setTimeout(resetForm, 1800);
  });
});
 
function sendToSpace(url, text) {
  return fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: text })
  }).then(function(r) { return r.ok; }).catch(function() { return false; });
}
 
function sendEmail(loc, toEmail, payload, html) {
  if (!loc.emailjs_service || !loc.emailjs_template || !loc.emailjs_key) return Promise.resolve(false);
  emailjs.init(loc.emailjs_key);
  return emailjs.send(loc.emailjs_service, loc.emailjs_template, {
    to_email:     toEmail,
    subject:      "Appointment Result: " + payload.outcome + " — " + payload.customer + " (" + loc.name + ")",
    location:     loc.name,
    outcome:      payload.outcome,
    customer:     payload.customer,
    rep:          payload.rep,
    appt_time:    payload.apptTime,
    objection:    payload.objection  || "—",
    notes:        payload.notes      || "—",
    price:        payload.price      ? "$" + parseFloat(payload.price).toFixed(2)   : "—",
    payment:      payload.payment    || "—",
    deposit:      payload.deposit    ? "$" + parseFloat(payload.deposit).toFixed(2) : "—",
    submitted:    payload.submittedAt,
    message_body: html
  }).then(function() { return true; }).catch(function() { return false; });
}
 
function resetForm() {
  document.querySelectorAll(".outcome-btn").forEach(function(b) { b.classList.remove("selected"); });
  selectedOutcome = null;
  document.getElementById("form-fields").classList.remove("visible");
  ["f-customer","f-rep","f-time","f-objection","f-notes","f-price","f-deposit"].forEach(function(id) {
    document.getElementById(id).value = "";
  });
  document.getElementById("f-payment").value = "";
  document.getElementById("f-photo").value = "";
  document.getElementById("photo-preview").style.display = "none";
  document.getElementById("location-select").value = "";
  document.getElementById("form-body").style.display = "none";
  selectedLocation = null;
}
 
function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + (type || "") + " show";
  setTimeout(function() { t.classList.remove("show"); }, 3500);
}
</script>
</body>
</html>
